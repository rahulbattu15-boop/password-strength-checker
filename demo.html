<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .password-container {
            position: relative;
        }

        input {
            width: 100%;
            padding: 12px 45px 12px 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 20px;
        }

        .meter {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
        }

        .meter-bar {
            height: 100%;
            width: 0%;
            transition: .3s;
            border-radius: 5px;
        }

        .result {
            background: white;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
        }

        .score {
            font-size: 22px;
            font-weight: bold;
        }

        .strength {
            font-size: 20px;
            font-weight: bold;
        }

        .weak {
            color: red;
        }

        .medium {
            color: orange;
        }

        .strong {
            color: green;
        }

        ul {
            padding-left: 20px;
        }

        .requirements p {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<h1>Password Strength Checker</h1>

<div class="input-group">

    <label>Enter Password</label>

    <div class="password-container">
        <input type="password"
               id="password"
               placeholder="Enter password">

        <span class="eye-icon"
              id="togglePassword">👁️</span>
    </div>

    <div class="meter">
        <div class="meter-bar" id="meterBar"></div>
    </div>

</div>

<div class="result" id="result" style="display:none;">

    <div>
        Strength:
        <span id="strength" class="strength">Weak</span>
    </div>

    <div class="score" id="score">0/100</div>

    <h3>Requirements</h3>

    <div class="requirements">
        <p id="lengthReq">❌ Minimum 8 characters</p>
        <p id="upperReq">❌ Uppercase letter</p>
        <p id="lowerReq">❌ Lowercase letter</p>
        <p id="numberReq">❌ Number</p>
        <p id="specialReq">❌ Special character</p>
    </div>

    <h3>Suggestions</h3>
    <ul id="suggestionsList"></ul>

</div>

<script>

const passwordInput = document.getElementById('password');
const togglePassword = document.getElementById('togglePassword');
const result = document.getElementById('result');
const scoreText = document.getElementById('score');
const strengthText = document.getElementById('strength');
const suggestionsList = document.getElementById('suggestionsList');
const meterBar = document.getElementById('meterBar');

togglePassword.addEventListener('click', () => {

    if(passwordInput.type === "password"){
        passwordInput.type = "text";
        togglePassword.textContent = "🙈";
    } else {
        passwordInput.type = "password";
        togglePassword.textContent = "👁️";
    }

});

passwordInput.addEventListener('input', () => {

    const password = passwordInput.value;

    if(password === ""){
        result.style.display = "none";
        return;
    }

    result.style.display = "block";

    let score = 0;
    let suggestions = [];

    // Length
    if(password.length >= 8){
        score += 20;
        document.getElementById('lengthReq').innerHTML =
            "✅ Minimum 8 characters";
    } else {
        suggestions.push("Use at least 8 characters.");
    }

    // Uppercase
    if(/[A-Z]/.test(password)){
        score += 20;
        document.getElementById('upperReq').innerHTML =
            "✅ Uppercase letter";
    } else {
        suggestions.push("Add uppercase letters.");
    }

    // Lowercase
    if(/[a-z]/.test(password)){
        score += 20;
        document.getElementById('lowerReq').innerHTML =
            "✅ Lowercase letter";
    } else {
        suggestions.push("Add lowercase letters.");
    }

    // Numbers
    if(/[0-9]/.test(password)){
        score += 20;
        document.getElementById('numberReq').innerHTML =
            "✅ Number";
    } else {
        suggestions.push("Include numbers.");
    }

    // Special characters
    if(/[^A-Za-z0-9]/.test(password)){
        score += 20;
        document.getElementById('specialReq').innerHTML =
            "✅ Special character";
    } else {
        suggestions.push("Add special characters.");
    }

    // Common patterns
    if(/123|abc|qwerty|password/i.test(password)){
        score -= 20;
        suggestions.push("Avoid common patterns.");
    }

    // Repeated characters
    if(/(.)\1{2,}/.test(password)){
        score -= 10;
        suggestions.push("Avoid repeated characters.");
    }

    score = Math.max(0, Math.min(score,100));

    scoreText.textContent = score + "/100";

    if(score < 50){
        strengthText.textContent = "Weak";
        strengthText.className = "strength weak";
        meterBar.style.background = "red";
    }
    else if(score < 80){
        strengthText.textContent = "Medium";
        strengthText.className = "strength medium";
        meterBar.style.background = "orange";
    }
    else{
        strengthText.textContent = "Strong";
        strengthText.className = "strength strong";
        meterBar.style.background = "green";
    }

    meterBar.style.width = score + "%";

    suggestionsList.innerHTML = "";

    if(suggestions.length === 0){
        suggestions.push("Excellent password!");
    }

    suggestions.forEach(item => {
        let li = document.createElement('li');
        li.textContent = item;
        suggestionsList.appendChild(li);
    });

});

</script>

</body>
</html>
